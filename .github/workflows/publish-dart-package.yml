name: Publish Dart package

on:
  push:
    tags:
      - 'open_earable_protocols-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish generated Dart package
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Verify generated protocol bindings
        run: |
          python -m protocol_generator
          git diff --exit-code generated

      - name: Run generator tests
        run: python -m unittest discover -s tests

      - name: Install Dart dependencies
        working-directory: generated/dart
        run: dart pub get

      - name: Validate Dart package
        working-directory: generated/dart
        run: dart pub publish --dry-run

      - name: Publish Dart package
        working-directory: generated/dart
        run: dart pub publish --force
